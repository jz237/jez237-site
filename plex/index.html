<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plex — Under Construction</title>
  <script>(function(){try{var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <link rel="icon" type="image/svg+xml" href="/assets/brand.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/design.css" />
  <link rel="stylesheet" href="/assets/site-enhance.css" />
  <style>
    main.container { max-width: 900px; margin: 0 auto; padding: 32px clamp(16px,3vw,40px) 80px; }
    .construction-icon {
      font-size: 64px;
      text-align: center;
      margin-bottom: 18px;
      animation: uc-bob 3s ease-in-out infinite;
    }
    @keyframes uc-bob { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-6px) rotate(3deg); } }
    .uc-actions { display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:26px; }
    .uc-actions a { padding:12px 20px;border-radius:999px;text-decoration:none;font-weight:500;transition:transform 0.3s var(--ease-out), box-shadow 0.3s ease; }
    .uc-actions a:hover { transform:translateY(-2px); box-shadow:0 10px 26px rgba(0,0,0,0.3); }
    .uc-actions a.primary { background:linear-gradient(120deg,rgba(232,197,122,0.9),rgba(224,102,126,0.85));color:#1d1811; }
    .uc-actions a.secondary { background:rgba(255,255,255,0.06);color:var(--ink-hi);border:1px solid rgba(232,197,122,0.25); }
  </style>
</head>
<body>
  <header id="site-nav"></header>

  <main class="container">
    <section class="hero-editorial" style="text-align:center;">
      <div class="construction-icon">🎬</div>
      <div class="eyebrow">Soon</div>
      <h1>Plex is under construction.</h1>
      <p class="lede" style="margin-left:auto;margin-right:auto;">The home-media library view isn't ready yet. Check back later — or head somewhere that is.</p>
      <div class="uc-actions">
        <a class="primary" href="/">Back to Home</a>
        <a class="secondary" href="/photos/">Photos</a>
      </div>
    </section>
  </main>

  <script src="/assets/site-enhance.js" defer></script>
  <script src="/assets/nav.js" defer></script>
</body>
</html>
