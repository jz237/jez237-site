<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jez237 — Garden</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <style>
    .masonry {
      columns: 3;
      column-gap: 10px;
      padding: 0;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .masonry-item img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }
    .masonry-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 12px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: 0 0 10px 10px;
    }
    .masonry-item:hover .caption {
      opacity: 1;
    }
    .load-more-wrap {
      text-align: center;
      margin: 24px 0;
    }
    .load-more-btn {
      background: var(--accent, #5865f2);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .load-more-btn:hover { opacity: 0.85; }
    .photo-count {
      color: var(--muted, #888);
      font-size: 13px;
      margin-top: 8px;
    }
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img {
      max-width: 92vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .lightbox-caption {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 15px;
      background: rgba(0,0,0,0.6);
      padding: 8px 18px;
      border-radius: 8px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 48px; }
    @media (max-width: 900px) { .masonry { columns: 2; } }
    @media (max-width: 500px) { .masonry { columns: 1; } }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="brand">jez237-site</div>
      <div class="links">
        <a href="../../index.html">Home</a>
        <a href="../">Photos</a>
        <a href="./">Garden</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="kicker">Garden</div>
      <h1 class="title">Small Space Growing</h1>
      <p class="muted">Click any photo to enlarge.</p>
    </section>

    <div class="masonry" id="gallery"></div>

    <div class="load-more-wrap">
      <button class="load-more-btn" id="load-more" style="display:none">Load more</button>
      <button class="load-more-btn" id="back-to-top" style="display:none; background:#555;">↑ Back to top</button>
      <div class="photo-count" id="photo-count"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="emoji">🌱</div>
      <p>No garden photos yet — send some to get started!</p>
    </div>

    <footer>
      <a href="../">← Back to Photos</a>
    </footer>
  </main>

  <div class="lightbox-overlay" id="lightbox">
    <img id="lightbox-img" src="" alt="" />
    <div class="lightbox-caption" id="lightbox-cap"></div>
  </div>

  <script>
    const BATCH_SIZE = 12;
    let loaded = 0;

    const photos = [
      // Add garden photos here: { src: "images/name.jpg", alt: "desc", caption: "caption" },
    ];

    const gallery = document.getElementById('gallery');
    const btn = document.getElementById('load-more');
    const countEl = document.getElementById('photo-count');
    const topBtn = document.getElementById('back-to-top');
    const emptyState = document.getElementById('empty-state');

    function loadBatch() {
      const end = Math.min(loaded + BATCH_SIZE, photos.length);
      for (let i = loaded; i < end; i++) {
        const p = photos[i];
        const div = document.createElement('div');
        div.className = 'masonry-item';
        div.dataset.caption = p.caption;
        div.innerHTML = `<img src="${p.src}" alt="${p.alt}" loading="lazy" /><div class="caption">${p.caption}</div>`;
        div.addEventListener('click', () => openLightbox(p.src, p.caption));
        gallery.appendChild(div);
      }
      loaded = end;
      countEl.textContent = `${loaded} of ${photos.length}`;
      if (loaded >= photos.length) btn.style.display = 'none';
    }

    const overlay = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCap = document.getElementById('lightbox-cap');

    function openLightbox(src, caption) {
      lbImg.src = src;
      lbCap.textContent = caption;
      overlay.classList.add('active');
    }
    overlay.addEventListener('click', () => { overlay.classList.remove('active'); lbImg.src = ''; });
    topBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

    if (photos.length > 0) {
      emptyState.style.display = 'none';
      btn.style.display = 'inline-block';
      loadBatch();
      btn.addEventListener('click', () => { loadBatch(); if (loaded > BATCH_SIZE) topBtn.style.display = 'inline-block'; });
    }
  </script>
</body>
</html>
