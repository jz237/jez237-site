name: Refresh AI News Feed

on:
  schedule:
    - cron: "12 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh feed
        run: |
          cd ai-news
          python fetch_ai_news.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-news/data/items.json ai-news/public/*.json ai-news/public/index.html
          git diff --staged --quiet || git commit -m "chore: refresh ai news feed"

      - name: Push
        run: |
          git push
