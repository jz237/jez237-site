<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jez237 — Cat Corner</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header>
    <nav>
      <div class="brand">jez237-site</div>
      <div class="links">
        <a href="../index.html">Home</a>
        <a href="../ai-news/">AI News</a>
        <a href="./index.html">Cats</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="kicker">Cat Corner</div>
      <h1 class="title">Luca, Cosmo, Taco & Marty</h1>
      <p class="muted">A few favorites uploaded from your phone.</p>
    </section>

    <section class="card" style="margin-top:16px;">
      <div class="gallery-grid">
        <figure class="gallery-card">
          <img src="../assets/cats/marty-cat-tree.jpg" alt="Marty on cat tree" loading="lazy" />
          <figcaption>Marty on lookout duty</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/luca-cosmo.jpg" alt="Luca and Cosmo together" loading="lazy" />
          <figcaption>Luca & Cosmo</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/taco-belly.jpg" alt="Taco relaxing on blanket" loading="lazy" />
          <figcaption>Taco (belly mode)</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/luca-gaming.jpg" alt="Luca pawing at game screen" loading="lazy" />
          <figcaption>Luca gaming assistant</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/cosmo-portrait.jpg" alt="Cosmo portrait" loading="lazy" />
          <figcaption>Cosmo portrait</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/marty-closeup.jpg" alt="Marty closeup" loading="lazy" />
          <figcaption>Marty closeup</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/luca-napping.jpg" alt="Luca napping" loading="lazy" />
          <figcaption>Luca napping</figcaption>
        </figure>

        <figure class="gallery-card">
          <img src="../assets/cats/cosmo-sprawl.jpg" alt="Cosmo sprawled on carpet" loading="lazy" />
          <figcaption>Cosmo sprawl</figcaption>
        </figure>
      </div>
    </section>

    <footer>
      More cat drops coming soon.
    </footer>
  </main>
</body>
</html>
