<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jez237 — Cat Corner</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .masonry {
      columns: 3;
      column-gap: 10px;
      padding: 0;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .masonry-item img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }
    .masonry-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 12px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: 0 0 10px 10px;
    }
    .masonry-item:hover .caption {
      opacity: 1;
    }

    .load-more-wrap {
      text-align: center;
      margin: 24px 0;
    }
    .load-more-btn {
      background: var(--accent, #5865f2);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .load-more-btn:hover {
      opacity: 0.85;
    }
    .photo-count {
      color: var(--muted, #888);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Lightbox */
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox-overlay.active {
      display: flex;
    }
    .lightbox-overlay img {
      max-width: 92vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .lightbox-caption {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 15px;
      background: rgba(0,0,0,0.6);
      padding: 8px 18px;
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .masonry { columns: 2; }
    }
    @media (max-width: 500px) {
      .masonry { columns: 1; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="brand">jez237-site</div>
      <div class="links">
        <a href="../index.html">Home</a>
        <a href="../ai-news/">AI News</a>
        <a href="./index.html">Cats</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="kicker">Cat Corner</div>
      <h1 class="title">Luca, Cosmo, Taco & Marty</h1>
      <p class="muted">Click any photo to enlarge.</p>
    </section>

    <div class="masonry" id="gallery"></div>

    <div class="load-more-wrap">
      <button class="load-more-btn" id="load-more">Load more</button>
      <div class="photo-count" id="photo-count"></div>
    </div>

    <footer>
      More cat drops coming soon.
    </footer>
  </main>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <img id="lightbox-img" src="" alt="" />
    <div class="lightbox-caption" id="lightbox-cap"></div>
  </div>

  <script>
    const BATCH_SIZE = 12;
    let loaded = 0;

    const photos = [
      { src: "../assets/cats/marty-cat-tree.jpg", alt: "Marty on cat tree", caption: "Marty on lookout duty" },
      { src: "../assets/cats/luca-cosmo.jpg", alt: "Luca and Cosmo together", caption: "Luca & Cosmo" },
      { src: "../assets/cats/taco-belly.jpg", alt: "Taco relaxing on blanket", caption: "Taco (belly mode)" },
      { src: "../assets/cats/luca-gaming.jpg", alt: "Luca pawing at game screen", caption: "Luca gaming assistant" },
      { src: "../assets/cats/taco-portrait.jpg", alt: "Taco portrait", caption: "Taco: professional model" },
      { src: "../assets/cats/marty-closeup.jpg", alt: "Marty closeup", caption: "Marty's \"we need to talk\" face" },
      { src: "../assets/cats/luca-napping.jpg", alt: "Luca napping", caption: "Luca: do not disturb" },
      { src: "../assets/cats/cosmo-sprawl.jpg", alt: "Cosmo sprawled on carpet", caption: "Cosmo vs. the spring toy (spring winning)" },
      { src: "../assets/cats/luca-toy-hoard.jpg", alt: "Luca guarding toy box", caption: "Luca and the treasure chest of chaos" },
      { src: "../assets/cats/luca-blanket-burrito.jpg", alt: "Luca wrapped in blanket", caption: "Luca: certified blanket burrito" },
      { src: "../assets/cats/cosmo-throne.jpg", alt: "Cosmo sitting on ottoman", caption: "Cosmo: the void on his throne" },
      { src: "../assets/cats/luca-king-of-the-tower.jpg", alt: "Luca on top of scratching post", caption: "Luca: king of the tower (Cosmo plotting below)" },
      { src: "../assets/cats/taco-cat-tree-loaf.jpg", alt: "Taco loafing on cat tree", caption: "Taco: loaf mode activated, green eyes locked on" },
      { src: "../assets/cats/luca-cosmo-bunk-beds.jpg", alt: "Luca and Cosmo on cat tree levels", caption: "Luca & Cosmo: bunk bed rules (top bunk picks the show)" },
      { src: "../assets/cats/luca-lap-nap.jpg", alt: "Luca napping on lap", caption: "Luca: claimed your lap, no refunds" },
      { src: "../assets/cats/taco-stoop-boss.jpg", alt: "Taco sitting on concrete step", caption: "Taco: the stoop boss sees all" },
      { src: "../assets/cats/kittens-and-taco-box.jpg", alt: "Luca and Cosmo as kittens in a box with Taco watching", caption: "The origin story: two tiny voids and their bodyguard" },
      { src: "../assets/cats/luca-zen-master.jpg", alt: "Luca sleeping closeup", caption: "Luca: achieving inner peace (zero thoughts detected)" },
      { src: "../assets/cats/kitten-hammock-claws.jpg", alt: "Black kitten sleeping in hammock with claws out", caption: "Tiny void, big claws, zero worries" },
      { src: "../assets/cats/luca-passed-out.jpg", alt: "Luca sleeping closeup on cat tree", caption: "Luca: out cold, whiskers at maximum deploy" },
      { src: "../assets/cats/luca-cosmo-cuddle-puddle.jpg", alt: "Luca and Cosmo cuddled together on red blanket", caption: "Luca & Cosmo: one brain cell, shared custody" },
      { src: "../assets/cats/luca-cosmo-synchronized-nap.jpg", alt: "Luca and Cosmo napping side by side", caption: "Luca & Cosmo: synchronized napping, Olympic gold" },
    ];

    const gallery = document.getElementById('gallery');
    const btn = document.getElementById('load-more');
    const countEl = document.getElementById('photo-count');

    function loadBatch() {
      const end = Math.min(loaded + BATCH_SIZE, photos.length);
      for (let i = loaded; i < end; i++) {
        const p = photos[i];
        const div = document.createElement('div');
        div.className = 'masonry-item';
        div.dataset.caption = p.caption;
        div.innerHTML = `<img src="${p.src}" alt="${p.alt}" loading="lazy" /><div class="caption">${p.caption}</div>`;
        div.addEventListener('click', () => openLightbox(p.src, p.caption));
        gallery.appendChild(div);
      }
      loaded = end;
      countEl.textContent = `${loaded} of ${photos.length}`;
      if (loaded >= photos.length) {
        btn.style.display = 'none';
      }
    }

    // Lightbox
    const overlay = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCap = document.getElementById('lightbox-cap');

    function openLightbox(src, caption) {
      lbImg.src = src;
      lbCap.textContent = caption;
      overlay.classList.add('active');
    }
    overlay.addEventListener('click', () => {
      overlay.classList.remove('active');
      lbImg.src = '';
    });

    // Initial load
    loadBatch();
    btn.addEventListener('click', loadBatch);
  </script>
</body>
</html>
