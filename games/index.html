<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>(function(){try{if(localStorage.getItem("theme")==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}document.write('<base href="'+(location.hostname==="jz237.github.io"?"/jez237-site/":"/")+'">');})();</script>
  <title>Jez237 — Game Experiments</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand.svg" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/design.css" />
  <link rel="stylesheet" href="assets/site-enhance.css" />
  <style>
    main.container { max-width: 1200px; margin: 0 auto; padding: 22px clamp(16px,3vw,40px) 80px; }

    .game-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 24px 0 26px;
    }
    .game-filters button {
      background: rgba(40,33,26,0.6);
      border: 1px solid rgba(232,197,122,0.2);
      color: var(--ink-mid);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .game-filters button:hover {
      background: rgba(232,197,122,0.12);
      border-color: rgba(232,197,122,0.4);
      color: var(--brand-gold);
      transform: translateY(-1px);
    }
    .game-filters button.active {
      background: linear-gradient(120deg, rgba(232,197,122,0.22), rgba(224,102,126,0.2));
      border-color: rgba(232,197,122,0.55);
      color: var(--ink-hi);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 18px;
      border-radius: var(--r-md);
      background: var(--surf-2);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      color: inherit;
      transition: transform 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out);
      position: relative;
      overflow: hidden;
    }
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      text-decoration: none;
    }
    .game-card .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8em;
      background: linear-gradient(135deg, rgba(232,197,122,0.25), rgba(122,179,98,0.18));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: visible;
    }
    .game-card .icon-wrap > span {
      display: inline-block;
      transform-origin: center center;
      will-change: transform, filter, opacity;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.25));
    }

    /* Appropriate per-icon animations. Type picked by JS from emoji. */
    @keyframes g-thrust {
      0%   { transform: translateY(0) rotate(-2deg); }
      30%  { transform: translateY(-6px) rotate(0deg); }
      40%  { transform: translateY(-10px) translateX(1px) rotate(2deg); }
      60%  { transform: translateY(-3px) translateX(-1px) rotate(-1deg); }
      100% { transform: translateY(0) rotate(-2deg); }
    }
    @keyframes g-twinkle {
      0%,100% { transform: scale(1) rotate(0); opacity: 1; }
      40%     { transform: scale(1.25) rotate(15deg); opacity: 0.85; }
      60%     { transform: scale(0.92) rotate(-10deg); opacity: 1; }
    }
    @keyframes g-burst {
      0%,100% { transform: scale(1) rotate(0); opacity: 1; }
      40%     { transform: scale(1.35) rotate(10deg); opacity: 0.9; }
      55%     { transform: scale(0.95) rotate(-8deg); opacity: 1; }
    }
    @keyframes g-swing {
      0%,100% { transform: rotate(-18deg); }
      50%     { transform: rotate(18deg); }
    }
    @keyframes g-sway {
      0%,100% { transform: rotate(-6deg) translateY(0); }
      50%     { transform: rotate(6deg) translateY(-2px); }
    }
    @keyframes g-spin {
      0%   { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
    @keyframes g-chug {
      0%,100% { transform: translateX(0) translateY(0); }
      25%     { transform: translateX(-2px) translateY(-1px); }
      50%     { transform: translateX(2px) translateY(0); }
      75%     { transform: translateX(-1px) translateY(1px); }
    }
    @keyframes g-wave {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      25%     { transform: translateY(-2px) rotate(2deg); }
      50%     { transform: translateY(-4px) rotate(-2deg); }
      75%     { transform: translateY(-2px) rotate(3deg); }
    }
    @keyframes g-flash {
      0%,100% { transform: scale(1);    opacity: 1; }
      10%     { transform: scale(1.2);  opacity: 0.25; }
      15%     { transform: scale(0.95); opacity: 1; }
      25%     { transform: scale(1.1);  opacity: 0.5; }
      35%     { transform: scale(1);    opacity: 1; }
    }
    @keyframes g-streak {
      0%   { transform: translateX(-6px) rotate(-10deg); opacity: 0.6; }
      50%  { transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(6px) rotate(10deg); opacity: 0.6; }
    }
    @keyframes g-rotate-slow {
      0%   { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
    @keyframes g-float {
      0%,100% { transform: translateY(0) rotate(-1deg); }
      50%     { transform: translateY(-4px) rotate(1deg); }
    }
    @keyframes g-shake {
      0%,100% { transform: translate(0,0) rotate(0); }
      10% { transform: translate(-1px,1px) rotate(-2deg); }
      20% { transform: translate(1px,-1px) rotate(2deg); }
      30% { transform: translate(-1px,-1px) rotate(-1deg); }
      40% { transform: translate(1px,1px) rotate(1deg); }
      50% { transform: translate(-1px,1px) rotate(-2deg); }
      60% { transform: translate(0,0) rotate(0); }
    }
    @keyframes g-hammer {
      0%,100% { transform: rotate(-10deg) translateY(0); }
      30%     { transform: rotate(12deg) translateY(-2px); }
      40%     { transform: rotate(15deg) translateY(0); }
      50%     { transform: rotate(10deg) translateY(1px); }
    }
    @keyframes g-slither {
      0%,100% { transform: translateX(-4px) skewX(-6deg); }
      50%     { transform: translateX(4px) skewX(6deg); }
    }

    .game-card .icon-wrap > span[data-anim="thrust"]      { animation: g-thrust      2.0s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="twinkle"]     { animation: g-twinkle     2.6s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="burst"]       { animation: g-burst       1.8s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="swing"]       { animation: g-swing       1.6s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="sway"]        { animation: g-sway        3.2s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="spin"]        { animation: g-spin        4s linear infinite; }
    .game-card .icon-wrap > span[data-anim="chug"]        { animation: g-chug        0.4s steps(4) infinite; }
    .game-card .icon-wrap > span[data-anim="wave"]        { animation: g-wave        2.8s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="flash"]       { animation: g-flash       2.2s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="streak"]      { animation: g-streak      3s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="rotate-slow"] { animation: g-rotate-slow 16s linear infinite; }
    .game-card .icon-wrap > span[data-anim="float"]       { animation: g-float       3.4s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="shake"]       { animation: g-shake       1.4s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="hammer"]      { animation: g-hammer      0.9s ease-in-out infinite; }
    .game-card .icon-wrap > span[data-anim="slither"]     { animation: g-slither     2.2s ease-in-out infinite; }
    /* User explicitly asked for animations — reduced-motion is ignored here. */
    /* Color variety so the grid feels playful without clashing with the site */
    .game-card:nth-child(6n+1) .icon-wrap { background: linear-gradient(135deg, rgba(77,150,255,.32), rgba(127,107,255,.2)); }
    .game-card:nth-child(6n+2) .icon-wrap { background: linear-gradient(135deg, rgba(255,217,61,.3), rgba(255,107,107,.2)); }
    .game-card:nth-child(6n+3) .icon-wrap { background: linear-gradient(135deg, rgba(107,203,119,.3), rgba(68,209,255,.2)); }
    .game-card:nth-child(6n+4) .icon-wrap { background: linear-gradient(135deg, rgba(198,107,255,.3), rgba(255,95,162,.2)); }
    .game-card:nth-child(6n+5) .icon-wrap { background: linear-gradient(135deg, rgba(255,122,0,.28), rgba(255,217,61,.2)); }
    .game-card:nth-child(6n+6) .icon-wrap { background: linear-gradient(135deg, rgba(68,209,255,.28), rgba(107,107,255,.22)); }

    .game-card .title {
      font-family: var(--font-serif, 'Fraunces', Georgia, serif);
      font-weight: 500;
      font-size: 1.05rem;
      line-height: 1.2;
      letter-spacing: -0.005em;
      color: var(--ink-hi);
    }
    .game-card .desc {
      font-size: 12.5px;
      color: var(--ink-mid);
      line-height: 1.45;
    }
    .game-card .date {
      font-size: 11px;
      color: var(--ink-lo);
      letter-spacing: 0.03em;
    }
    .game-card .tag {
      display: inline-block;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 999px;
      width: fit-content;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .game-card .tag.featured     { background: rgba(127,149,255,0.18); color: #c8d1ff; border: 1px solid rgba(127,149,255,0.4); }
    .game-card .tag.classic      { background: rgba(255,217,61,0.18);  color: #ffe38a; border: 1px solid rgba(255,217,61,0.4); }
    .game-card .tag.experimental { background: rgba(198,107,255,0.16); color: #d7b8ff; border: 1px solid rgba(163,119,217,0.4); }

    .game-count {
      text-align: center;
      color: var(--ink-lo);
      font-size: 13px;
      margin-top: 28px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <header id="site-nav"></header>

  <main class="container">

    <section class="hero-editorial">
      <div class="eyebrow">Playable prototypes</div>
      <h1>GameMaster Arcade.</h1>
      <p class="lede">Mobile-first HTML5 games — built by AI agents, tuned for touch, playable right here. Model showdowns, mechanics experiments, and rebuilds of 70s classics.</p>
    </section>

    <div class="game-filters" id="game-filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="featured">⭐ Featured</button>
      <button data-filter="classic">🎮 Classic</button>
      <button data-filter="experimental">🧪 Experimental</button>
      <button data-filter="arcade">🕹️ Arcade</button>
      <button data-filter="puzzle">🧩 Puzzle</button>
      <button data-filter="adventure">🗺️ Adventure</button>
      <button data-filter="retro70s">📺 70s Classics</button>
    </div>

    <div class="game-grid" id="game-grid"></div>
    <p class="game-count" id="game-count"></p>

    <footer style="margin-top:60px;padding:30px 0;text-align:center;color:var(--ink-lo);font-size:13px;border-top:1px solid rgba(255,255,255,0.06);">
      <a href="index.html" style="color:var(--brand-gold)">← Back to Home</a>
    </footer>
  </main>

  <script>
    const BASE = 'https://jz237.github.io/games/';
    const games = [
      // Featured (polished)
      { title: 'Hard Hat Mac',                  path: 'hard-hat-mac/',                         emoji: '👷', date: 'Mar 17', cat: 'arcade',   tag: 'featured',     desc: 'Classic 1983 Apple II remake — 3 construction levels' },
      { title: 'Crystal Cavern',                path: '2026-03-16/crystal-cavern/',            emoji: '💎', date: 'Mar 16', cat: 'arcade',   tag: 'featured',     desc: 'Descend through dark crystal caves with dynamic lighting' },
      { title: 'Shatter Storm',                 path: '2026-03-11/shatter-storm/',             emoji: '🧱', date: 'Mar 11', cat: 'arcade',   tag: 'featured',     desc: 'Stained-glass breakout' },
      { title: 'Plasma Pong',                   path: '2026-03-10/plasma-pong/',               emoji: '🏓', date: 'Mar 10', cat: 'arcade',   tag: 'featured',     desc: 'Neon pong with plasma trails' },
      { title: 'Asteroids HD',                  path: '2026-03-09/asteroids-hd/',              emoji: '🚀', date: 'Mar 9',  cat: 'arcade',   tag: 'featured',     desc: '3D asteroids, powerups, boost' },
      { title: 'Missile Command: Aurora Siege', path: '2026-03-08/missile-command/',           emoji: '🎆', date: 'Mar 8',  cat: 'arcade',   tag: 'featured',     desc: 'Defend cities from the sky' },
      { title: 'Missile Command (GPT)',         path: 'gpt-missile-command/',                  emoji: '🎇', date: 'Mar 8',  cat: 'arcade',   tag: 'featured',     desc: "GPT's take on Missile Command" },
      { title: 'Missile Command 3D',            path: '2026-03-17/missile-command-3d/',        emoji: '🚀', date: 'Mar 17', cat: 'arcade',   tag: 'featured',     desc: '3D perspective with destructible cities' },
      { title: 'Stellar Drift',                 path: '2026-03-25/stellar-drift/',             emoji: '✨', date: 'Mar 25', cat: 'arcade',   tag: 'featured',     desc: 'One-finger auto-fire space shooter' },
      { title: 'Lantern Creek',                 path: '2026-03-29/lantern-creek/',             emoji: '🏮', date: 'Mar 29', cat: 'puzzle',   tag: 'featured',     desc: 'Guide glowing lanterns down a moonlit stream' },
      { title: 'SUPER STAR TREK',               path: '2026-03-27/star-trek/',                 emoji: '🖖', date: 'Mar 27', cat: 'retro70s', tag: 'featured',     desc: 'The 70s computer classic — reborn with LCARS visuals' },
      { title: 'Asteroids',                     path: '2026-03-08/asteroids/',                 emoji: '☄️', date: 'Mar 8',  cat: 'arcade',   tag: 'featured',     desc: 'Classic asteroids, mobile controls' },
      { title: 'Lunar Lander',                  path: 'lunar-lander/lunar-lander.html',        emoji: '🌕', date: 'Apr 7',  cat: 'arcade',   tag: 'featured',     desc: 'Precision moon landing with retro vibes' },
      { title: 'Neon Qix',                      path: '2026-04-09/quix-modern/',               emoji: '⚡', date: 'Apr 9',  cat: 'arcade',   tag: 'featured',     desc: 'Modernized Qix with neon field capture' },

      // Classic
      { title: 'Depth Charge',                  path: '2026-03-08/depth-charge/',              emoji: '🌊', date: 'Mar 8',  cat: 'arcade',   tag: 'classic',      desc: 'Sonar submarine hunt' },
      { title: 'Boulder Dash',                  path: '2026-03-05/boulder-dash/',              emoji: '💎', date: 'Mar 5',  cat: 'puzzle',   tag: 'classic',      desc: 'Diamond mine classic' },
      { title: 'Neon Serpent',                  path: '2026-03-05/neon-serpent/',              emoji: '🐍', date: 'Mar 5',  cat: 'arcade',   tag: 'classic',      desc: 'Snake with neon style' },
      { title: 'Ember Knight',                  path: '2026-03-06/ember-knight/',              emoji: '⚔️', date: 'Mar 6',  cat: 'adventure',tag: 'classic',      desc: 'Dungeon crawler' },
      { title: 'Glassrail Bastion',             path: '2026-03-06/glassrail-bastion/',         emoji: '🚂', date: 'Mar 6',  cat: 'arcade',   tag: 'classic',      desc: 'Rail defense' },

      // Experimental
      { title: 'Vortex: Storm Eater',           path: '2026-03-04/vortex/',                    emoji: '🌪️', date: 'Mar 4', cat: 'arcade',   tag: 'experimental', desc: 'Early-build storm shooter' },
      { title: 'Runecaster',                    path: '2026-03-04/runecaster/',                emoji: '🧙', date: 'Mar 4',  cat: 'arcade',   tag: 'experimental', desc: 'Magic-mechanic prototype' },
      { title: 'Tessera',                       path: '2026-03-04/tessera/',                   emoji: '⬡',  date: 'Mar 4',  cat: 'puzzle',   tag: 'experimental', desc: 'Hex-grid puzzle experiment' },
      { title: 'Slash',                         path: '2026-03-04/slash/',                     emoji: '⚡', date: 'Mar 4',  cat: 'arcade',   tag: 'experimental', desc: 'Reflex swipe-action test' },
      { title: 'Void Echo',                     path: '2026-03-03/void-echo/',                 emoji: '🌌', date: 'Mar 3',  cat: 'arcade',   tag: 'experimental', desc: 'Space-ambient exploration' },
      { title: 'Gravity Weaver',                path: '2026-03-03/gravity-weaver/',            emoji: '🕸️', date: 'Mar 3', cat: 'puzzle',   tag: 'experimental', desc: 'Gravity-puzzle prototype' }
    ];

    const grid   = document.getElementById('game-grid');
    const count  = document.getElementById('game-count');
    const filters= document.getElementById('game-filters');

    let currentFilter = 'all';

    function tagLabel(t) {
      return t === 'featured' ? '⭐ Featured'
           : t === 'classic'  ? '🎮 Classic'
           : '🧪 Experimental';
    }

    // Map each emoji to an appropriate motion
    const EMOJI_ANIM = {
      '👷': 'hammer',   // construction worker
      '💎': 'twinkle',  // crystal
      '🧱': 'shake',    // brick shatter
      '🏓': 'swing',    // pong paddle
      '🚀': 'thrust',   // rocket
      '🎆': 'burst',    // firework
      '🎇': 'burst',
      '✨': 'twinkle',  // sparkles
      '🏮': 'sway',     // lantern
      '🖖': 'float',    // vulcan salute — steady, intentional
      '☄️': 'streak',   // comet
      '🌕': 'rotate-slow', // moon
      '⚡': 'flash',    // lightning
      '🌊': 'wave',
      '🐍': 'slither',  // snake
      '⚔️': 'swing',    // sword
      '🚂': 'chug',     // train
      '🌪️': 'spin',    // tornado
      '🧙': 'float',    // wizard
      '⬡':  'spin',     // hexagon
      '🌌': 'float',    // void
      '🕸️': 'sway'      // web
    };
    function animForEmoji(e) {
      return EMOJI_ANIM[e] || 'float';
    }

    function render() {
      const list = currentFilter === 'all'
        ? games
        : games.filter(g => g.tag === currentFilter || g.cat === currentFilter);
      grid.innerHTML = list.map(g => `
        <a class="game-card" href="${BASE}${g.path}" target="_blank" rel="noopener">
          <span class="icon-wrap"><span data-anim="${animForEmoji(g.emoji)}">${g.emoji}</span></span>
          <span class="title">${g.title}</span>
          ${g.desc ? `<span class="desc">${g.desc}</span>` : ''}
          <span class="date">${g.date}</span>
          <span class="tag ${g.tag}">${tagLabel(g.tag)}</span>
        </a>
      `).join('');
      count.textContent = `${list.length} game${list.length === 1 ? '' : 's'}${currentFilter === 'all' ? '' : ' · ' + currentFilter}`;
    }

    filters.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-filter]');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      filters.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });

    render();

    // Randomize animation-delay per icon so the grid doesn't pulse in unison
    function jitterIconDelays() {
      document.querySelectorAll('.game-card .icon-wrap > span').forEach(el => {
        el.style.animationDelay = (-Math.random() * 4).toFixed(2) + 's';
      });
    }
    jitterIconDelays();
    // Re-jitter after each filter change (re-renders new cards)
    filters.addEventListener('click', jitterIconDelays);
  </script>
  <script src="assets/site-enhance.js" defer></script>
  <script src="assets/nav.js" defer></script>
</body>
</html>
