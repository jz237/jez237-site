<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASTEROIDS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#0ff;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;position:fixed;top:0;left:0}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0}
#hud{position:fixed;top:10px;left:10px;font-size:18px;text-shadow:0 0 8px #0ff,0 0 16px #0ff;z-index:10;pointer-events:none}
#hud .score{font-size:24px;font-weight:bold}
#hud .lives{margin-top:4px;font-size:20px}
#hud .wave{margin-top:2px;font-size:14px;color:#0f8}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:auto;background:rgba(0,0,0,0.85)}
#overlay h1{font-size:42px;text-shadow:0 0 20px #0ff,0 0 40px #08f;margin-bottom:12px}
#overlay .sub{font-size:15px;color:#f0f;text-shadow:0 0 10px #f0f;margin-bottom:24px}
#overlay button{background:none;border:2px solid #0ff;color:#0ff;font-family:inherit;font-size:20px;padding:14px 40px;cursor:pointer;text-shadow:0 0 8px #0ff;box-shadow:0 0 12px #0ff44,inset 0 0 12px #0ff22;border-radius:8px;transition:all .2s}
#overlay button:active{background:#0ff33;box-shadow:0 0 24px #0ff88}
#overlay.hidden{display:none;pointer-events:none}
#tutorial{position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;pointer-events:auto;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
#tutorial.hidden{display:none;pointer-events:none}
#tutorial h2{font-size:28px;color:#0ff;text-shadow:0 0 16px #0ff;margin-bottom:24px}
#tutorial .ctrl{margin:8px 0;font-size:16px;color:#ccc;line-height:1.6}
#tutorial .ctrl em{color:#0ff;font-style:normal;font-weight:bold}
#tutorial .ctrl .icon{font-size:22px;margin-right:6px}
#tutorial button{margin-top:28px;background:none;border:2px solid #0ff;color:#0ff;font-family:inherit;font-size:18px;padding:12px 36px;border-radius:8px;text-shadow:0 0 8px #0ff;box-shadow:0 0 12px #0ff44}
#tutorial button:active{background:#0ff33}

</style>
</head>
<body>
<div id="hud"><div class="score" id="score">0</div><div class="lives" id="lives"></div><div class="wave" id="wave"></div></div>

<div id="tutorial">
<h2>🚀 CONTROLS</h2>
<div class="ctrl"><span class="icon">👆</span> <em>Hold anywhere</em> → Fly toward that point</div>
<div class="ctrl"><span class="icon">💥</span> <em>Tap</em> → Shoot</div>
<div class="ctrl" style="margin-top:12px;font-size:13px;color:#f0f">Hold one finger to fly, tap with another to shoot!</div>
<button id="tutorialBtn">GOT IT</button>
</div>

<div id="overlay" class="hidden"><h1>ASTEROIDS</h1><div class="sub">NEON VECTOR EDITION</div><button id="startBtn">START</button></div>
<canvas id="c"></canvas>


<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),waveEl=document.getElementById('wave');
const overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
const tutorial=document.getElementById('tutorial'),tutorialBtn=document.getElementById('tutorialBtn');


// Prevent all default touch behavior
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchstart',e=>{if(e.target===canvas)e.preventDefault()},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('contextmenu',e=>e.preventDefault());

let W,H,ship,asteroids,bullets,particles,score,lives,wave,gameOver,gameStarted,shakeTimer,shakeMag;
let keys={};
const TAU=Math.PI*2;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// --- Keyboard (fallback) ---
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});

// --- Touch Controls (hold to steer+thrust, tap to shoot) ---
const touches={};// track active touches
let touchThrust=false;// is any finger held down for thrust?
let touchTargetA=null;// target angle from touch point

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!gameStarted||gameOver)return;
  for(const t of e.changedTouches){
    touches[t.identifier]={x:t.clientX,y:t.clientY,startTime:performance.now(),moved:false};
  }
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];
    if(!info)continue;
    const dx=t.clientX-info.x,dy=t.clientY-info.y;
    if(Math.abs(t.clientX-info.x)>8||Math.abs(t.clientY-info.y)>8)info.moved=true;
    info.x=t.clientX;info.y=t.clientY;
  }
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];
    if(info){
      const dt=performance.now()-info.startTime;
      if(dt<200&&!info.moved){
        // Tap = shoot
        keys._tapFire=true;
        setTimeout(()=>{keys._tapFire=false},50);
      }
      delete touches[t.identifier];
    }
  }
  updateTouchTarget();
},{passive:false});

canvas.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches)delete touches[t.identifier];
  updateTouchTarget();
},{passive:false});

function updateTouchTarget(){
  const ids=Object.keys(touches);
  // Find the oldest held touch (primary finger for steering)
  let oldest=null,oldestTime=Infinity;
  for(const id of ids){
    const t=touches[id];
    if(performance.now()-t.startTime>=150||t.moved){
      // This is a hold, not a tap candidate — use it for steering
      if(t.startTime<oldestTime){oldest=t;oldestTime=t.startTime;}
    }
  }
  // If no definitive hold yet, use any active touch for steering (responsive feel)
  if(!oldest&&ids.length>0){
    for(const id of ids){
      const t=touches[id];
      if(t.startTime<oldestTime){oldest=t;oldestTime=t.startTime;}
    }
  }
  if(oldest&&ship){
    touchTargetA=Math.atan2(oldest.y-ship.y,oldest.x-ship.x);
    touchThrust=ids.length>0;
  }else{
    touchThrust=false;
    touchTargetA=null;
  }
}

function isKey(action){
  switch(action){
    case'left':return keys.ArrowLeft||keys.KeyA;
    case'right':return keys.ArrowRight||keys.KeyD;
    case'thrust':return keys.ArrowUp||keys.KeyW||touchThrust;
    case'fire':return keys.Space||keys._tapFire;
  }
}

// --- Entities ---
function makeShip(){return{x:W/2,y:H/2,a:-Math.PI/2,vx:0,vy:0,r:15,fireCd:0,invuln:120,thrustOn:false}}

function makeAsteroid(x,y,size){
  const r=size===3?40:size===2?22:12;
  const speed=(1.2+wave*0.15)*(4-size)*0.4;
  const a=Math.random()*TAU;
  const verts=[];
  const n=8+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){verts.push(r*(0.7+Math.random()*0.3));}
  return{x,y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r,size,verts,n,rot:Math.random()*TAU,rotV:(Math.random()-0.5)*0.02};
}

function spawnWave(){
  wave++;
  waveEl.textContent='WAVE '+wave;
  const count=3+wave;
  for(let i=0;i<count;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H}while(Math.hypot(x-ship.x,y-ship.y)<150);
    asteroids.push(makeAsteroid(x,y,3));
  }
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*TAU,s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*30,maxLife:60,color});
  }
}

// --- Game Loop ---
function initGame(){
  ship=makeShip();asteroids=[];bullets=[];particles=[];score=0;lives=3;wave=0;gameOver=false;shakeTimer=0;shakeMag=0;
  spawnWave();updateHUD();

}

function updateHUD(){
  scoreEl.textContent=score;
  livesEl.textContent='♦'.repeat(lives);
}

function update(){
  if(gameOver)return;
  if(isKey('left'))ship.a-=0.06;
  if(isKey('right'))ship.a+=0.06;
  // Smooth rotation toward touch target
  if(touchTargetA!==null&&touchThrust){
    updateTouchTarget();// refresh angle with current ship pos
    let diff=touchTargetA-ship.a;
    // Normalize to [-PI, PI]
    while(diff>Math.PI)diff-=TAU;
    while(diff<-Math.PI)diff+=TAU;
    const rotSpeed=0.08;
    if(Math.abs(diff)>rotSpeed)ship.a+=Math.sign(diff)*rotSpeed;
    else ship.a=touchTargetA;
  }
  ship.thrustOn=isKey('thrust');
  if(ship.thrustOn){ship.vx+=Math.cos(ship.a)*0.12;ship.vy+=Math.sin(ship.a)*0.12}
  ship.vx*=0.99;ship.vy*=0.99;
  const spd=Math.hypot(ship.vx,ship.vy);if(spd>8){ship.vx*=8/spd;ship.vy*=8/spd}
  ship.x+=ship.vx;ship.y+=ship.vy;
  wrap(ship);
  if(ship.invuln>0)ship.invuln--;
  if(ship.fireCd>0)ship.fireCd--;
  if(isKey('fire')&&ship.fireCd<=0){
    bullets.push({x:ship.x+Math.cos(ship.a)*18,y:ship.y+Math.sin(ship.a)*18,vx:Math.cos(ship.a)*7,vy:Math.sin(ship.a)*7,life:55});
    ship.fireCd=10;
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){bullets.splice(i,1);continue}
    wrap(b);
  }
  for(const a of asteroids){a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotV;wrap(a)}
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        bullets.splice(i,1);asteroids.splice(j,1);
        score+=a.size===1?100:a.size===2?50:20;
        spawnParticles(a.x,a.y,['#0ff','#0f0','#f0f'][a.size-1],12+a.size*4);
        if(a.size>1){asteroids.push(makeAsteroid(a.x,a.y,a.size-1));asteroids.push(makeAsteroid(a.x,a.y,a.size-1))}
        updateHUD();break;
      }
    }
  }
  if(ship.invuln<=0){
    for(let j=asteroids.length-1;j>=0;j--){
      const a=asteroids[j];
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r*0.6){
        lives--;shakeTimer=20;shakeMag=12;
        spawnParticles(ship.x,ship.y,'#f44',25);updateHUD();
        if(lives<=0){gameOver=true;showOverlay('GAME OVER','Score: '+score);return}
        ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;ship.invuln=120;break;
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  if(asteroids.length===0)spawnWave();
  if(shakeTimer>0)shakeTimer--;
}

function wrap(o){
  const m=50;
  if(o.x<-m)o.x=W+m;if(o.x>W+m)o.x=-m;
  if(o.y<-m)o.y=H+m;if(o.y>H+m)o.y=-m;
}

function draw(){
  ctx.save();
  if(shakeTimer>0){
    const s=shakeMag*(shakeTimer/20);
    ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);
  }
  ctx.clearRect(-50,-50,W+100,H+100);
  if(!gameOver&&ship){
    const blink=ship.invuln>0&&Math.floor(ship.invuln/4)%2;
    if(!blink){
      ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
      ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.shadowColor='#0ff';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,10);ctx.lineTo(-7,0);ctx.lineTo(-12,-10);ctx.closePath();ctx.stroke();
      if(ship.thrustOn){
        ctx.strokeStyle='#f80';ctx.shadowColor='#f80';ctx.shadowBlur=16;
        ctx.beginPath();ctx.moveTo(-7,5);ctx.lineTo(-18-Math.random()*8,0);ctx.lineTo(-7,-5);ctx.stroke();
      }
      ctx.restore();
    }
  }
  ctx.strokeStyle='#0f8';ctx.lineWidth=1.5;ctx.shadowColor='#0f8';ctx.shadowBlur=10;
  if(asteroids)for(const a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.beginPath();
    for(let i=0;i<=a.n;i++){
      const idx=i%a.n,ang=TAU*idx/a.n,r=a.verts[idx];
      const px=Math.cos(ang)*r,py=Math.sin(ang)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  }
  ctx.shadowColor='#f0f';ctx.shadowBlur=14;
  if(bullets)for(const b of bullets){
    ctx.fillStyle='#f0f';ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,TAU);ctx.fill();
  }
  ctx.shadowBlur=6;
  if(particles)for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2*alpha,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();

}

function showOverlay(title,sub){
  overlay.classList.remove('hidden');
  overlay.querySelector('h1').textContent=title;
  overlay.querySelector('.sub').textContent=sub||'';
  startBtn.textContent=gameOver?'RESTART':'START';
}

// Tutorial flow
const tutorialSeen=localStorage.getItem('asteroids_tutorial');
if(tutorialSeen){
  tutorial.classList.add('hidden');
  overlay.classList.remove('hidden');
}

tutorialBtn.addEventListener('click',()=>{
  tutorial.classList.add('hidden');
  overlay.classList.remove('hidden');
  localStorage.setItem('asteroids_tutorial','1');
});

startBtn.addEventListener('click',()=>{
  overlay.classList.add('hidden');
  gameStarted=true;initGame();
});

let bgStars=[];for(let i=0;i<80;i++)bgStars.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*1.5+0.5});

function loop(){
  requestAnimationFrame(loop);
  if(gameStarted&&!gameOver)update();
  draw();
  ctx.fillStyle='#fff3';
  for(const s of bgStars){ctx.fillRect(s.x%W,s.y%H,s.s,s.s)}
}
loop();
</script>
</body>
</html>
